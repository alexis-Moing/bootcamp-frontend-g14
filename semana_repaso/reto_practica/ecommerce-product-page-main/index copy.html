<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>E-commerce product page</title>
  <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

  <header class="header wrapper">

    <nav class="header_nav">
      <img src="./images/logo.svg" alt="logo">

      <ul class="header_navigation">
        <li><a href="">Collections</a></li>
        <li><a href="">Men</a></li>
        <li><a href="">Women</a></li>
        <li><a href="">About</a></li>
        <li><a href="">Contact</a></li>
      </ul>
    </nav>

    <nav class="header_cart">
      <img src="./images/icon-cart.svg" alt="cart">
      <img class="header_avatar" src="./images/image-avatar.png" alt="avatar">
    </nav>
    
  </header>

  <section class="hero">

    <section class="images">
      <div class="images_extended">
        <img class="images_extended_image" 
        src="./images/image-product-1.jpg" alt="hero">
      </div>

      <div class="images_small">
        <img class="images_small_image" src="./images/image-product-1.jpg" alt="hero">
        <img class="images_small_image" src="./images/image-product-2.jpg" alt="hero">
        <img class="images_small_image" src="./images/image-product-3.jpg" alt="hero">
        <img class="images_small_image" src="./images/image-product-4.jpg" alt="hero">
      </div>
    </section>

    <section class="product-info">
      <span>Sneaker Company</span>
      <h1>Fall Limited Edition Sneakers</h1>
      <p>These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.</p>
      <div class="price">
        <span>$125.00</span>
        <span>50%</span>
        <span>$250.00</span>
      </div>
      <button>Add to cart</button>
    </section>
  </section>
  
  
</body>
</html>
